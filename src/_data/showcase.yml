projects:
- name: Moon Rider
  author: Supermedium
  url: https://moonrider.xyz
  description: Surf the musical road among the moon, stars, and lights.
  image: /images/showcase/moonrider.jpg

- name: Soundboxing WebVR
  author: Eric Florenzano (with Supermedium)
  url: https://webvr.soundboxing.co
  description: A VR music kickboxing game!
  image: /images/showcase/soundboxing.jpg

- name: Towermax Fitness
  author: Towermax Fitness
  url: https://towermax.fitness/
  description: Soundbased virtual reality workout for boxers, martial arts and fitness enthusiasts.
  image: /images/showcase/towermaxfitness.jpg

- name: CERN CMS / LHC Tour
  author: CERN
  url: http://cms-aframe.web.cern.ch/
  description: A 360-degree tour of CERN's Large Hadron Collider (LHC) particle acclerator and its Compact Muon Solenoid (CMS).
  image: /images/showcase/cern.jpg

- name: Hubs
  author: Hubs Foundation
  url: https://demo.hubsfoundation.org/
  description: A virtual collaboration platform that lets you create your own 3D spaces. Invite anyone with a URL — no account needed.
  image: /images/showcase/mozilla.jpg

- name: Stand at the Edge of Geologic Time
  author: NPR
  url: https://apps.npr.org/rockymountain-vr/
  description: Transport yourself to Rocky Mountain National Park, with all its sights and sounds, in this immersive geology lesson.
  image: /images/showcase/npr.jpg

- name: A-Painter
  author: A-Frame Team
  url: https://aframe.io/a-painter/
  description: Paint in VR with your hands.
  image: /images/showcase/apainter.jpg

- name: Barrier Mage
  author: Doug Reeder
  url: https://dougreeder.github.io/barrier-mage/
  description: Draw mystic symbols to burn, protect, or detect & drive off fantastic creatures! [headset required]
  image: /images/showcase/barrier-mage.jpg
  
- name: SimpleDraw
  author: Diarmid Mackenzie
  url: https://simpledraw.app/gallery?vr=true
  description: Create scale drawings and floor plans in 2D, and then view them in VR.
  image: /images/showcase/simple-draw.jpg

